name: api-ci

on:
  push:
    branches:
      - api-seb

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      -
        name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.SEB_DOCKERHUB_USERNAME }}
          password: ${{ secrets.SEB_DOCKERHUB_TOKEN }}
      -
        name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      -
        name: Build and push
        uses: docker/build-push-action@v7
        with:
          push: true
          tags: ${{ secrets.SEB_DOCKERHUB_USERNAME }}/umap-api:latest
